# A subscription is an active contract that grants permission to use the resources at a cloud provider. It acts as the bridge between an identity and a provider's billing system.
origin_resource = "identity"

[[create_resource]]
resource_type = "login"
name = " {{- origin_resource.function | lower -}}_{{- origin_resource.name | lower -}}"
[create_resource.properties]
function = "tbd"
description = "tbd"
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
