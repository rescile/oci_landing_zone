# A login is a credential that enables identities to rent resources, manage servicdes, or change settings at a cloud provider.
origin_resource = "identity"

[[create_resource]]
resource_type = "login"
name = " {{- origin_resource.name | lower -}}_{{- origin_resource.function | lower -}}"
[create_resource.properties]
function = "{{- origin_resource.function | lower -}}"
role = "{{- origin_resource.name | lower -}}"
description = "{{- origin_resource.description -}}"
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
